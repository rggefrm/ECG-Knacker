<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EKG-Knacker App</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#005c97">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #e0eafc, #cfdef3);
            --card-bg: #ffffff;
            --text-main: #333333;
            --primary: #005c97;
            --primary-hover: #363795;
            --secondary: #6c757d;
            --secondary-hover: #5a6268;
            --green: #28a745;
            --yellow: #ffc107;
            --red: #dc3545;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg-gradient); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; color: var(--text-main); }
        .app-container { background: var(--card-bg); width: 100%; max-width: 500px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); padding: 30px; text-align: center; }
        h1 { color: var(--primary); margin-bottom: 20px; }
        .question { font-size: 1.2rem; margin-bottom: 20px; font-weight: bold; }
        .btn { display: block; width: 100%; padding: 15px; margin-bottom: 10px; border: none; border-radius: 8px; background-color: var(--primary); color: white; font-size: 1rem; cursor: pointer; transition: background 0.3s; }
        .btn:hover { background-color: var(--primary-hover); }
        .btn-back { background-color: var(--secondary); margin-top: 15px; }
        .btn-back:hover { background-color: var(--secondary-hover); }
        .btn-restart { background-color: var(--text-main); margin-top: 15px; }
        .btn-restart:hover { background-color: #000; }
        .result-box { padding: 20px; border-radius: 10px; color: white; font-weight: bold; font-size: 1.2rem; margin-top: 20px; margin-bottom: 20px; display: none; }
        .bg-green { background-color: var(--green); }
        .bg-yellow { background-color: var(--yellow); color: #333; }
        .bg-red { background-color: var(--red); }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>EKG-Knacker</h1>
        <div class="question" id="question-text">Lädt...</div>
        <div id="result-box" class="result-box"></div>
        <div id="buttons-container"></div>
        <button id="btn-back" class="btn btn-back" onclick="goBack()" style="display: none;">Zurück</button>
        <button id="btn-restart" class="btn btn-restart" onclick="restart()" style="display: none;">Neues EKG</button>
    </div>

    <script>
        // Your Original Decision Tree Logic
        const ekgTree = {
            "start": { 
                q: "2. Ableitung ansehen. Erregung?", 
                options: [ 
                    { text: "Nein", next: "res_asystolie" }, 
                    { text: "Ja", next: "q_regelmassig" } 
                ] 
            },
            
            "q_regelmassig": { 
                q: "Gibt es irgendeine Regelmäßigkeit?", 
                options: [ 
                    { text: "Keinerlei! Regelmäßigkeit", next: "q_puls_keinerlei" }, 
                    { text: "Irgendeine Regelmäßigkeit", next: "q_qrs_breite" } 
                ] 
            },
            
            "q_puls_keinerlei": { 
                q: "Puls?", 
                options: [ 
                    { text: "Kein Puls", next: "res_kf" }, 
                    { text: "Puls vorhanden", next: "res_artefakt" } 
                ] 
            },

            "q_qrs_breite": {
                q: "Ist der QRS-Komplex schmal oder breit?",
                options: [
                    { text: "Schmal (≤ 120ms)", next: "q_p_wellen" },
                    { text: "Breit (> 120ms)", next: "res_breitkomplex" }
                ]
            },

            "q_p_wellen": {
                q: "Sind P-Wellen vorhanden?",
                options: [
                    { text: "Ja, normale P-Wellen", next: "q_schmal_hf" },
                    { text: "Regelmäßige Sägezahnwellen", next: "res_aflutter" },
                    { text: "Keine erkennbaren P-Wellen, flimmernde Grundlinie", next: "res_afib" }
                ]
            },
            
            "q_schmal_hf": { 
                q: "Sinusrhythmus. Herzfrequenz/min?", 
                options: [ 
                    { text: "< 60", next: "res_sinus_brady" }, 
                    { text: "60 - 100", next: "res_sinus_norm" }, 
                    { text: "> 100", next: "res_sinus_tachy" }, 
                    { text: "Variable Frequenz", next: "res_sinus_arrhythmie" } 
                ] 
            },

            // RESULTS
            "res_asystolie": { diag: "Asystolie. Reanimation beginnen!", color: "bg-red" },
            "res_kf": { diag: "Kammerflimmern. Reanimation / Defibrillation!", color: "bg-red" },
            "res_artefakt": { diag: "Bewegungsartefakte. EKG-Kabel prüfen.", color: "bg-yellow" },
            "res_breitkomplex": { diag: "Breitkomplextachykardie / Schenkelblock. Arzt hinzuziehen!", color: "bg-yellow" },
            "res_afib": { diag: "Vorhofflimmern (VHF). Absolute Arrhythmie. Frequenzkontrolle, Antikoagulation prüfen.", color: "bg-yellow" },
            "res_aflutter": { diag: "Vorhofflattern. Oft 2:1 oder 3:1 Überleitung.", color: "bg-yellow" },
            "res_sinus_brady": { diag: "Sinusbradykardie", color: "bg-green" },
            "res_sinus_norm": { diag: "Normofrequenter Sinusrhythmus", color: "bg-green" },
            "res_sinus_tachy": { diag: "Sinustachykardie", color: "bg-yellow" },
            "res_sinus_arrhythmie": { diag: "Sinusarrhythmie", color: "bg-green" }
        };

        let appHistory = [];
        let currentStep = "start";

        function render() {
            const stepData = ekgTree[currentStep];
            const qText = document.getElementById('question-text');
            const btnContainer = document.getElementById('buttons-container');
            const resBox = document.getElementById('result-box');
            const backBtn = document.getElementById('btn-back');
            const restartBtn = document.getElementById('btn-restart');

            btnContainer.innerHTML = '';
            resBox.style.display = 'none';
            backBtn.style.display = appHistory.length > 0 ? 'block' : 'none';

            if (stepData.diag) {
                qText.innerText = "Diagnose / Info:";
                resBox.innerText = stepData.diag;
                resBox.className = "result-box " + (stepData.color || "bg-yellow");
                resBox.style.display = 'block';
                restartBtn.style.display = 'block';
            } else {
                qText.innerText = stepData.q;
                restartBtn.style.display = 'none';
                stepData.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'btn';
                    btn.innerText = opt.text;
                    btn.onclick = () => {
                        appHistory.push(currentStep);
                        currentStep = opt.next;
                        render();
                    };
                    btnContainer.appendChild(btn);
                });
            }
        }

        function goBack() {
            if (appHistory.length > 0) {
                currentStep = appHistory.pop();
                render();
            }
        }

        function restart() {
            appHistory = [];
            currentStep = "start";
            render();
        }

        render();
    </script>
</body>
</html>
